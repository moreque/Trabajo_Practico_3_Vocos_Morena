<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro al Fan Club</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <img src="img/logo.png" alt="Logo" width="100">
        <h1>Inscripción al Club de Harry Potter</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="registro.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Formulario de Inscripción</h2>
        
        <form>
            <label for="user">Nombre de Usuario:</label>
            <input type="text" id="user" name="user" placeholder="Slayer99">

            <label for="correo">Email:</label>
            <input type="email" id="correo" name="correo" required>

            <label for="pass">Contraseña:</label>
            <input type="password" id="pass" name="pass">

            <label for="fecha">Fecha de Nacimiento:</label>
            <input type="date" id="fecha" name="fecha">

            <label for="personaje">Personaje Favorito:</label>
            <select id="personaje" name="personaje">
                <option value="" disabled selected>Selecciona un personaje...</option>
                <option value="harry">Harry Potter</option>
                <option value="ron">Ron Weasley</option>
                <option value="hermione">Hermione Granger</option>
                <option value="draco">Draco Malfoy</option>
                <option value="pansy">Pansy Parkinson</option>
                <option value="blaise">Blaise Zabini</option>
                <option value="james">James Potter</option>
                <option value="lily">Lily Evans</option>
                <option value="sirius">Sirius Black</option>
                <option value="remus">Remus Lupin</option>
                <option value="regulus">Regulus Black</option>
                <option value="evan">Evan Rosier</option>
                <option value="pandora">Pandora Lovegood</option>
                <option value="barty">Barty Crouch Jr.</option>
                <option value="severus">Severus Snape</option>
                <option value="bellatrix">Bellatrix Lestrange</option>
                <option value="luna">Luna Lovegood</option>
                <option value="neville">Neville Longbottom</option>
                <option value="cedric">Cedric Diggory</option>
                <option value="narcissa">Narcissa Malfoy</option>
            </select>

            <label>Tipo de Membresía:</label><br>
            <input type="radio" id="gratis" name="tipo" value="gratis" checked>
            <label for="gratis">Membresía Gratuita</label><br>
            <input type="radio" id="vip" name="tipo" value="vip">
            <label for="vip">Membresía VIP</label><br><br>

            <input type="checkbox" id="acepto" name="acepto" required>
            <label for="acepto">Acepto los términos</label><br><br>

            <button type="submit">Registrarse</button>
        </form>
    </main>

    <footer>
        <p>Copyright 2026 - Mi Página de Fans</p>
    </footer>

</body>
</html>
